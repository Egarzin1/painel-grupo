<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Grupo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.35);
    color: white;
}

.app {
    width: 100vw;
    height: 100vh;
    display: flex;
    padding: 16px;
    gap: 12px;
}

.sidebar {
    width: 62px;
    height: 100%;
    background: #111827;
    border-radius: 18px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 42px;
    height: 42px;
    background: #7c3aed;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

.nav-btn {
    width: 44px;
    height: 44px;
    border: 0;
    border-radius: 14px;
    background: #1f2937;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.nav-btn.active {
    background: #7c3aed;
}

.content {
    flex: 1;
    height: 100%;
    background: #0f172a;
    border-radius: 22px;
    padding: 18px;
    overflow: hidden;
}

.header {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.group-title h1 {
    font-size: 28px;
}

.group-title span {
    font-size: 14px;
    color: #94a3b8;
}

.role-badge {
    background: #7c3aed;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: bold;
}

.page {
    display: none;
    height: calc(100% - 70px);
    overflow: hidden;
}

.page.active {
    display: block;
}

.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 10px;
}

.card {
    background: #1e293b;
    border-radius: 18px;
    padding: 18px;
}

.card h3 {
    color: #94a3b8;
    font-size: 15px;
    margin-bottom: 8px;
}

.card strong {
    font-size: 28px;
}

.members-box {
    margin-top: 10px;
    height: calc(100% - 10px);
    overflow-y: auto;
    padding-right: 6px;
}

.member-item {
    width: 100%;
    background: #1e293b;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    gap: 12px;
    align-items: center;
}

.avatar {
    width: 44px;
    height: 44px;
    background: #334155;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.member-name {
    font-weight: bold;
}

.member-role {
    color: #94a3b8;
    font-size: 13px;
}

.status {
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: bold;
}

.online {
    background: #14532d;
    color: #86efac;
}

.offline {
    background: #3f1d1d;
    color: #fca5a5;
}

.action-btn {
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    background: #7c3aed;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.danger {
    background: #dc2626;
}

.cash-layout {
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 12px;
}

.cash-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.cash-actions {
    background: #1e293b;
    border-radius: 18px;
    padding: 18px;
}

.cash-actions input {
    width: 100%;
    height: 44px;
    border: 0;
    outline: 0;
    border-radius: 12px;
    padding: 0 14px;
    background: #0f172a;
    color: white;
    margin-top: 10px;
}

.cash-actions button {
    margin-top: 10px;
    width: 100%;
    height: 42px;
}

.cash-history {
    background: #1e293b;
    border-radius: 18px;
    padding: 14px;
    overflow-y: auto;
    min-height: 0;
}

.history-item {
    background: #0f172a;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
}

.history-item strong {
    display: block;
    margin-bottom: 4px;
}

.logs-box {
    height: 100%;
    background: #1e293b;
    border-radius: 18px;
    padding: 14px;
    overflow-y: auto;
}

.log-item {
    background: #0f172a;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
    color: #cbd5e1;
}

.footer-actions {
    margin-top: 14px;
    display: flex;
    gap: 10px;
}

.footer-actions button {
    flex: 1;
    height: 46px;
}

::-webkit-scrollbar {
    width: 5px;
}

::-webkit-scrollbar-thumb {
    background: #475569;
    border-radius: 20px;
}

@media (max-width: 900px) {
    .app {
        padding: 8px;
        gap: 8px;
    }

    .sidebar {
        width: 54px;
        border-radius: 16px;
    }

    .nav-btn {
        width: 40px;
        height: 40px;
        font-size: 16px;
    }

    .content {
        padding: 12px;
        border-radius: 18px;
    }

    .header {
        height: 58px;
    }

    .group-title h1 {
        font-size: 20px;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    .cash-top {
        grid-template-columns: 1fr;
    }

    .member-item {
        grid-template-columns: 38px 1fr auto;
    }

    .member-item .action-btn {
        grid-column: 1 / 4;
    }
}
</style>
</head>

<body>

<div class="app">
    <div class="sidebar">
        <div class="logo">ORG</div>
        <button class="nav-btn active" onclick="openPage('home', this)">🏠</button>
        <button class="nav-btn" onclick="openPage('members', this)">👥</button>
        <button class="nav-btn" onclick="openPage('cash', this)">💰</button>
        <button class="nav-btn" onclick="openPage('logs', this)">📜</button>
    </div>

    <div class="content">
        <div class="header">
            <div class="group-title">
                <h1 id="groupName">Carregando...</h1>
                <span id="groupType">Organização</span>
            </div>
            <div class="role-badge" id="myRole">Membro</div>
        </div>

        <div id="home" class="page active">
            <div class="cards">
                <div class="card">
                    <h3>Membros</h3>
                    <strong id="totalMembers">0</strong>
                </div>

                <div class="card">
                    <h3>Online</h3>
                    <strong id="onlineMembers">0</strong>
                </div>

                <div class="card">
                    <h3>Caixa da Org</h3>
                    <strong id="cashBalance">R$ 0</strong>
                </div>
            </div>

            <div class="footer-actions">
                <button id="leaveBtn" class="action-btn danger" onclick="leaveOrDelete()">Sair do grupo</button>
                <button class="action-btn" onclick="closePanel()">Fechar Painel</button>
            </div>
        </div>

        <div id="members" class="page">
            <div class="members-box" id="membersList"></div>
        </div>

        <div id="cash" class="page">
            <div class="cash-layout">
                <div class="cash-top">
                    <div class="cash-actions">
                        <h3>Depositar no caixa</h3>
                        <input id="depositValue" type="number" placeholder="Valor">
                        <button class="action-btn" onclick="depositCash()">Depositar</button>
                    </div>

                    <div class="cash-actions" id="withdrawBox">
                        <h3>Sacar do caixa</h3>
                        <input id="withdrawValue" type="number" placeholder="Valor">
                        <button class="action-btn danger" onclick="withdrawCash()">Sacar</button>
                    </div>
                </div>

                <div class="cash-history" id="cashHistory"></div>
            </div>
        </div>

        <div id="logs" class="page">
            <div class="logs-box" id="logsList"></div>
        </div>
    </div>
</div>

<script>
let groupData = {
    groupName: "Sem Grupo",
    groupType: "Organização",
    myRole: "Membro",
    cashBalance: 0,
    members: [],
    cashHistory: [],
    logs: []
};

function openPage(page, btn) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

    document.getElementById(page).classList.add("active");
    btn.classList.add("active");
}

function money(value) {
    return "R$ " + Number(value || 0).toLocaleString("pt-BR");
}

function isLeader() {
    return groupData.myRole === "Líder" || groupData.myRole === "Lider";
}

function canWithdraw() {
    return groupData.myRole === "Líder" || groupData.myRole === "Lider" || groupData.myRole === "Sub-Líder" || groupData.myRole === "Sub-Lider";
}

function canManage() {
    return canWithdraw();
}

function renderAll() {
    document.getElementById("groupName").innerText = groupData.groupName || "Sem Grupo";
    document.getElementById("groupType").innerText = groupData.groupType || "Organização";
    document.getElementById("myRole").innerText = groupData.myRole || "Membro";

    document.getElementById("totalMembers").innerText = groupData.members.length;
    document.getElementById("onlineMembers").innerText = groupData.members.filter(m => m.online).length;
    document.getElementById("cashBalance").innerText = money(groupData.cashBalance);

    document.getElementById("leaveBtn").innerText = isLeader() ? "Desfazer grupo" : "Sair do grupo";
    document.getElementById("withdrawBox").style.display = canWithdraw() ? "block" : "none";

    renderMembers();
    renderCashHistory();
    renderLogs();
}

function renderMembers() {
    const box = document.getElementById("membersList");
    box.innerHTML = "";

    if (!groupData.members.length) {
        box.innerHTML = `<div class="card">Nenhum membro encontrado.</div>`;
        return;
    }

    groupData.members.forEach(member => {
        box.innerHTML += `
            <div class="member-item">
                <div class="avatar">${String(member.name || "?").charAt(0).toUpperCase()}</div>
                <div>
                    <div class="member-name">${member.name}</div>
                    <div class="member-role">${member.role || "Membro"} • ${member.time || "0h"}</div>
                </div>
                <div class="status ${member.online ? "online" : "offline"}">
                    ${member.online ? "Online" : "Offline"}
                </div>
                ${
                    canManage()
                    ? `<button class="action-btn" onclick="manageMember('${member.name}')">Gerenciar</button>`
                    : ``
                }
            </div>
        `;
    });
}

function renderCashHistory() {
    const box = document.getElementById("cashHistory");
    box.innerHTML = "";

    if (!groupData.cashHistory.length) {
        box.innerHTML = `<div class="history-item">Nenhum histórico no caixa.</div>`;
        return;
    }

    groupData.cashHistory.forEach(item => {
        const type = item.type === "withdraw" ? "Saque" : "Depósito";

        box.innerHTML += `
            <div class="history-item">
                <strong>${type} - ${money(item.value)}</strong>
                <span>${item.player || "Desconhecido"} • ${item.date || ""}</span>
            </div>
        `;
    });
}

function renderLogs() {
    const box = document.getElementById("logsList");
    box.innerHTML = "";

    if (!groupData.logs.length) {
        box.innerHTML = `<div class="log-item">Nenhum log encontrado.</div>`;
        return;
    }

    groupData.logs.forEach(log => {
        box.innerHTML += `<div class="log-item">${log}</div>`;
    });
}

function loadGroupData(data) {
    groupData = data;
    renderAll();
}

function loadGroupDataFromURL() {
    try {
        const hash = window.location.hash || "";

        if (!hash.startsWith("#data=")) {
            renderAll();
            return;
        }

        const encoded = hash.substring(6);
        const decoded = decodeURIComponent(encoded);
        const json = JSON.parse(decoded);

        loadGroupData(json);
    } catch (e) {
        console.log("Erro JSON URL:", e);
        renderAll();
    }
}

function sendToPawn(action, data = {}) {
    const payload = JSON.stringify({
        action: action,
        data: data
    });

    if (window.cef && window.cef.emit) {
        window.cef.emit("org_panel", payload);
        return;
    }

    if (window.Android && window.Android.onGroupPanel) {
        window.Android.onGroupPanel(payload);
        return;
    }

    if (window.sampCEF && window.sampCEF.send) {
        window.sampCEF.send("org_panel", payload);
        return;
    }

    console.log("CEF SEND:", payload);
}

function depositCash() {
    const value = Number(document.getElementById("depositValue").value || 0);
    if (value <= 0) return;

    sendToPawn("deposit_cash", { value });
}

function withdrawCash() {
    const value = Number(document.getElementById("withdrawValue").value || 0);
    if (value <= 0) return;

    sendToPawn("withdraw_cash", { value });
}

function manageMember(name) {
    sendToPawn("manage_member", { name });
}

function leaveOrDelete() {
    if (isLeader()) {
        sendToPawn("delete_group");
    } else {
        sendToPawn("leave_group");
    }
}

function closePanel() {
    sendToPawn("close_panel");
}

loadGroupDataFromURL();
</script>

</body>
</html>
