<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Painel Grupo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    font-family: Arial, Helvetica, sans-serif;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    color: #fff;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
}

#app {
    width: 100vw;
    height: 100vh;
    background: rgba(5, 8, 18, 0.78);
    backdrop-filter: blur(8px);
    display: flex;
    padding: 18px;
    gap: 14px;
}

/* SIDEBAR */

.sidebar {
    width: 58px;
    height: 100%;
    background: rgba(15, 23, 42, 0.96);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px;
    gap: 10px;
    flex-shrink: 0;
}

.logo {
    width: 42px;
    height: 42px;
    border-radius: 15px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 13px;
    margin-bottom: 4px;
}

.nav {
    width: 42px;
    height: 42px;
    border: none;
    outline: none;
    border-radius: 15px;
    background: rgba(30, 41, 59, 0.95);
    color: #cbd5e1;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav.active {
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    color: #fff;
    box-shadow: 0 8px 22px rgba(124, 58, 237, 0.35);
}

.nav.close {
    margin-top: auto;
    background: rgba(127, 29, 29, 0.8);
    color: #fecaca;
}

/* MAIN */

.main {
    flex: 1;
    height: 100%;
    min-width: 0;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 26px;
    padding: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.topbar {
    width: 100%;
    height: 66px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-shrink: 0;
}

.group-info {
    min-width: 0;
}

.group-info h1 {
    font-size: 25px;
    line-height: 28px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.group-info p {
    margin-top: 4px;
    font-size: 13px;
    color: #94a3b8;
}

.role-box {
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(124, 58, 237, 0.2);
    color: #ddd6fe;
    border: 1px solid rgba(167, 139, 250, 0.25);
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
}

/* PAGES */

.page {
    display: none;
    height: calc(100% - 66px);
    min-height: 0;
    overflow: hidden;
}

.page.active {
    display: flex;
    flex-direction: column;
}

/* HOME */

.home-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 12px;
}

.stat-card {
    background: rgba(30, 41, 59, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 20px;
    padding: 18px;
    min-height: 120px;
}

.stat-card .label {
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 10px;
}

.stat-card .value {
    font-size: 31px;
    font-weight: 900;
}

.home-actions {
    margin-top: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* BUTTONS */

.btn {
    border: none;
    outline: none;
    border-radius: 15px;
    height: 46px;
    padding: 0 15px;
    color: #fff;
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    font-weight: 800;
    font-size: 14px;
}

.btn.red {
    background: linear-gradient(135deg, #dc2626, #991b1b);
}

.btn.gray {
    background: rgba(51, 65, 85, 0.95);
}

.btn.small {
    height: 38px;
    font-size: 12px;
    border-radius: 12px;
    padding: 0 12px;
}

/* MEMBERS */

.page-title {
    font-size: 18px;
    font-weight: 900;
    margin: 10px 0 12px;
}

.members-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 5px;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
}

.member-card {
    width: 100%;
    background: rgba(30, 41, 59, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 18px;
    padding: 13px;
    display: grid;
    grid-template-columns: 42px 1fr auto auto;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 15px;
    background: rgba(124, 58, 237, 0.25);
    border: 1px solid rgba(167, 139, 250, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ddd6fe;
    font-weight: 900;
}

.member-name {
    font-size: 14px;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.member-extra {
    margin-top: 3px;
    font-size: 12px;
    color: #94a3b8;
}

.status {
    height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
}

.status.online {
    background: rgba(22, 101, 52, 0.35);
    color: #86efac;
}

.status.offline {
    background: rgba(127, 29, 29, 0.35);
    color: #fca5a5;
}

/* CASH */

.cash-grid {
    height: 100%;
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 12px;
}

.cash-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.cash-card {
    background: rgba(30, 41, 59, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 20px;
    padding: 15px;
}

.cash-card h3 {
    font-size: 15px;
    margin-bottom: 10px;
}

.cash-card input {
    width: 100%;
    height: 43px;
    border: none;
    outline: none;
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.96);
    color: #fff;
    padding: 0 13px;
    font-size: 14px;
    margin-bottom: 10px;
}

.cash-history-box {
    background: rgba(30, 41, 59, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 20px;
    padding: 14px;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.cash-history-title {
    font-size: 15px;
    font-weight: 900;
    margin-bottom: 10px;
    flex-shrink: 0;
}

.cash-history {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 5px;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
}

.history-item {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(148, 163, 184, 0.1);
    border-radius: 15px;
    padding: 12px;
    margin-bottom: 9px;
}

.history-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.history-top strong {
    font-size: 13px;
}

.history-top span {
    font-size: 13px;
    font-weight: 900;
}

.deposit {
    color: #86efac;
}

.withdraw {
    color: #fca5a5;
}

.history-bottom {
    margin-top: 5px;
    color: #94a3b8;
    font-size: 12px;
}

/* LOGS */

.logs-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 5px;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
}

.log-item {
    background: rgba(30, 41, 59, 0.88);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 16px;
    padding: 13px;
    color: #cbd5e1;
    font-size: 13px;
    margin-bottom: 9px;
}

/* MODAL */

.modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
}

.modal {
    width: 360px;
    max-width: calc(100vw - 30px);
    background: #0f172a;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 22px;
    padding: 18px;
}

.modal h2 {
    font-size: 19px;
    margin-bottom: 10px;
}

.modal p {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 14px;
}

.modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* EMPTY */

.empty {
    background: rgba(30, 41, 59, 0.88);
    border: 1px dashed rgba(148, 163, 184, 0.22);
    border-radius: 18px;
    padding: 18px;
    text-align: center;
    color: #94a3b8;
    font-size: 14px;
}

/* SCROLL */

::-webkit-scrollbar {
    width: 5px;
}

::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.45);
    border-radius: 20px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

/* MOBILE CEF */

@media (max-width: 900px) {
    #app {
        padding: 8px;
        gap: 8px;
    }

    .sidebar {
        width: 50px;
        border-radius: 18px;
        padding: 8px 5px;
        gap: 8px;
    }

    .logo {
        width: 38px;
        height: 38px;
        font-size: 11px;
        border-radius: 13px;
    }

    .nav {
        width: 38px;
        height: 38px;
        border-radius: 13px;
        font-size: 15px;
    }

    .main {
        border-radius: 20px;
        padding: 11px;
    }

    .topbar {
        height: 54px;
    }

    .group-info h1 {
        font-size: 18px;
        line-height: 21px;
    }

    .group-info p {
        font-size: 11px;
    }

    .role-box {
        padding: 8px 11px;
        font-size: 11px;
    }

    .page {
        height: calc(100% - 54px);
    }

    .home-grid {
        grid-template-columns: 1fr;
        gap: 8px;
        margin-top: 8px;
    }

    .stat-card {
        min-height: 75px;
        border-radius: 16px;
        padding: 12px;
    }

    .stat-card .label {
        font-size: 11px;
        margin-bottom: 4px;
    }

    .stat-card .value {
        font-size: 22px;
    }

    .home-actions {
        gap: 8px;
    }

    .btn {
        height: 40px;
        font-size: 12px;
        border-radius: 13px;
    }

    .page-title {
        font-size: 15px;
        margin: 8px 0;
    }

    .member-card {
        grid-template-columns: 36px 1fr auto;
        gap: 8px;
        padding: 10px;
        border-radius: 15px;
    }

    .avatar {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        font-size: 13px;
    }

    .member-name {
        font-size: 12px;
    }

    .member-extra {
        font-size: 10px;
    }

    .status {
        height: 26px;
        font-size: 10px;
        padding: 0 8px;
    }

    .member-card .btn.small {
        grid-column: 1 / 4;
        width: 100%;
        height: 34px;
    }

    .cash-top {
        grid-template-columns: 1fr;
        gap: 8px;
    }

    .cash-card {
        padding: 11px;
        border-radius: 16px;
    }

    .cash-card h3 {
        font-size: 13px;
        margin-bottom: 8px;
    }

    .cash-card input {
        height: 38px;
        font-size: 12px;
        border-radius: 12px;
    }

    .cash-history-box {
        border-radius: 16px;
        padding: 11px;
    }

    .history-item {
        border-radius: 13px;
        padding: 10px;
    }

    .history-top strong,
    .history-top span,
    .history-bottom {
        font-size: 11px;
    }

    .log-item {
        font-size: 12px;
        padding: 11px;
        border-radius: 14px;
    }
}
</style>
</head>

<body>

<div id="app">
    <aside class="sidebar">
        <div class="logo">ORG</div>

        <button class="nav active" onclick="changePage('home', this)">🏠</button>
        <button class="nav" onclick="changePage('members', this)">👥</button>
        <button class="nav" onclick="changePage('cash', this)">💰</button>
        <button class="nav" onclick="changePage('logs', this)">📜</button>

        <button class="nav close" onclick="closePanel()">✕</button>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="group-info">
                <h1 id="groupName">Carregando...</h1>
                <p id="groupType">Organização</p>
            </div>

            <div class="role-box" id="myRole">Membro</div>
        </div>

        <section id="page-home" class="page active">
            <div class="home-grid">
                <div class="stat-card">
                    <div class="label">Membros totais</div>
                    <div class="value" id="totalMembers">0</div>
                </div>

                <div class="stat-card">
                    <div class="label">Membros online</div>
                    <div class="value" id="onlineMembers">0</div>
                </div>

                <div class="stat-card">
                    <div class="label">Caixa da org</div>
                    <div class="value" id="cashBalance">R$ 0</div>
                </div>
            </div>

            <div class="home-actions">
                <button class="btn red" id="leaveDeleteBtn" onclick="leaveOrDeleteGroup()">Sair do grupo</button>
                <button class="btn gray" onclick="closePanel()">Fechar painel</button>
            </div>
        </section>

        <section id="page-members" class="page">
            <div class="page-title">Membros</div>
            <div class="members-wrap" id="membersList"></div>
        </section>

        <section id="page-cash" class="page">
            <div class="page-title">Caixa da Organização</div>

            <div class="cash-grid">
                <div class="cash-top">
                    <div class="cash-card">
                        <h3>Depositar</h3>
                        <input type="number" id="depositInput" placeholder="Valor para depositar">
                        <button class="btn" onclick="depositCash()">Depositar</button>
                    </div>

                    <div class="cash-card" id="withdrawCard">
                        <h3>Sacar</h3>
                        <input type="number" id="withdrawInput" placeholder="Valor para sacar">
                        <button class="btn red" onclick="withdrawCash()">Sacar</button>
                    </div>
                </div>

                <div class="cash-history-box">
                    <div class="cash-history-title">Histórico do caixa</div>
                    <div class="cash-history" id="cashHistory"></div>
                </div>
            </div>
        </section>

        <section id="page-logs" class="page">
            <div class="page-title">Logs da Organização</div>
            <div class="logs-wrap" id="logsList"></div>
        </section>
    </main>
</div>

<div class="modal-bg" id="memberModal">
    <div class="modal">
        <h2 id="modalTitle">Gerenciar membro</h2>
        <p id="modalText">Escolha uma ação.</p>

        <div class="modal-actions">
            <button class="btn gray" onclick="closeMemberModal()">Cancelar</button>
            <button class="btn red" onclick="removeSelectedMember()">Remover</button>
        </div>
    </div>
</div>

<script>
let selectedMember = null;

let groupData = {
    groupName: "Sem Grupo",
    groupType: "Organização",
    myRole: "Membro",
    cashBalance: 0,
    members: [],
    cashHistory: [],
    logs: []
};

function changePage(page, btn) {
    document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
    document.querySelectorAll(".nav").forEach(el => el.classList.remove("active"));

    document.getElementById("page-" + page).classList.add("active");
    btn.classList.add("active");
}

function money(value) {
    value = Number(value || 0);
    return "R$ " + value.toLocaleString("pt-BR");
}

function normalizeRole(role) {
    return String(role || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
}

function isLeader() {
    const role = normalizeRole(groupData.myRole);
    return role === "lider";
}

function isSubLeaderOrLeader() {
    const role = normalizeRole(groupData.myRole);
    return role === "lider" || role === "sub-lider" || role === "sublider";
}

function canManageMembers() {
    return isSubLeaderOrLeader();
}

function canUseCashWithdraw() {
    return isSubLeaderOrLeader();
}

function renderAll() {
    document.getElementById("groupName").innerText = groupData.groupName || "Sem Grupo";
    document.getElementById("groupType").innerText = groupData.groupType || "Organização";
    document.getElementById("myRole").innerText = groupData.myRole || "Membro";

    document.getElementById("totalMembers").innerText = groupData.members.length;
    document.getElementById("onlineMembers").innerText = groupData.members.filter(m => m.online).length;
    document.getElementById("cashBalance").innerText = money(groupData.cashBalance);

    document.getElementById("leaveDeleteBtn").innerText = isLeader() ? "Desfazer grupo" : "Sair do grupo";
    document.getElementById("withdrawCard").style.display = canUseCashWithdraw() ? "block" : "none";

    renderMembers();
    renderCashHistory();
    renderLogs();
}

function renderMembers() {
    const list = document.getElementById("membersList");
    list.innerHTML = "";

    if (!groupData.members || groupData.members.length === 0) {
        list.innerHTML = `<div class="empty">Nenhum membro encontrado.</div>`;
        return;
    }

    groupData.members.forEach(member => {
        const name = member.name || "Desconhecido";
        const role = member.role || "Membro";
        const time = member.time || "0h";
        const online = !!member.online;

        const firstLetter = name.substring(0, 1).toUpperCase();

        list.innerHTML += `
            <div class="member-card">
                <div class="avatar">${firstLetter}</div>

                <div>
                    <div class="member-name">${escapeHTML(name)}</div>
                    <div class="member-extra">${escapeHTML(role)} • ${escapeHTML(time)}</div>
                </div>

                <div class="status ${online ? "online" : "offline"}">
                    ${online ? "Online" : "Offline"}
                </div>

                ${
                    canManageMembers()
                    ? `<button class="btn small" onclick="openMemberModal('${escapeAttr(name)}')">Gerenciar</button>`
                    : ``
                }
            </div>
        `;
    });
}

function renderCashHistory() {
    const box = document.getElementById("cashHistory");
    box.innerHTML = "";

    if (!groupData.cashHistory || groupData.cashHistory.length === 0) {
        box.innerHTML = `<div class="empty">Nenhum histórico encontrado.</div>`;
        return;
    }

    groupData.cashHistory.forEach(item => {
        const type = item.type === "withdraw" ? "Saque" : "Depósito";
        const cls = item.type === "withdraw" ? "withdraw" : "deposit";
        const player = item.player || "Desconhecido";
        const date = item.date || "";

        box.innerHTML += `
            <div class="history-item">
                <div class="history-top">
                    <strong>${type}</strong>
                    <span class="${cls}">${money(item.value)}</span>
                </div>

                <div class="history-bottom">
                    ${escapeHTML(player)} • ${escapeHTML(date)}
                </div>
            </div>
        `;
    });
}

function renderLogs() {
    const box = document.getElementById("logsList");
    box.innerHTML = "";

    if (!groupData.logs || groupData.logs.length === 0) {
        box.innerHTML = `<div class="empty">Nenhum log encontrado.</div>`;
        return;
    }

    groupData.logs.forEach(log => {
        box.innerHTML += `<div class="log-item">${escapeHTML(log)}</div>`;
    });
}

function loadGroupData(data) {
    groupData = {
        groupName: data.groupName || "Sem Grupo",
        groupType: data.groupType || "Organização",
        myRole: data.myRole || "Membro",
        cashBalance: Number(data.cashBalance || 0),
        members: Array.isArray(data.members) ? data.members : [],
        cashHistory: Array.isArray(data.cashHistory) ? data.cashHistory : [],
        logs: Array.isArray(data.logs) ? data.logs : []
    };

    renderAll();
}

function loadGroupDataFromURL() {
    try {
        const hash = window.location.hash || "";

        if (!hash.startsWith("#data=")) {
            renderAll();
            return;
        }

        const encoded = hash.substring(6);
        const decoded = decodeURIComponent(encoded);
        const json = JSON.parse(decoded);

        loadGroupData(json);
    } catch (e) {
        console.log("Erro ao carregar JSON da URL:", e);
        renderAll();
    }
}

function sendToPawn(action, data = {}) {
    const payload = JSON.stringify({
        action: action,
        data: data
    });

    if (window.cef && window.cef.emit) {
        window.cef.emit("org_panel", payload);
        return;
    }

    if (window.Android && window.Android.onGroupPanel) {
        window.Android.onGroupPanel(payload);
        return;
    }

    if (window.sampCEF && window.sampCEF.send) {
        window.sampCEF.send("org_panel", payload);
        return;
    }

    console.log("CEF SEND:", payload);
}

function depositCash() {
    const input = document.getElementById("depositInput");
    const value = Number(input.value || 0);

    if (value <= 0) return;

    sendToPawn("deposit_cash", {
        value: value
    });

    input.value = "";
}

function withdrawCash() {
    const input = document.getElementById("withdrawInput");
    const value = Number(input.value || 0);

    if (value <= 0) return;

    sendToPawn("withdraw_cash", {
        value: value
    });

    input.value = "";
}

function openMemberModal(name) {
    selectedMember = name;

    document.getElementById("modalTitle").innerText = "Gerenciar membro";
    document.getElementById("modalText").innerText = "Membro selecionado: " + name;
    document.getElementById("memberModal").style.display = "flex";
}

function closeMemberModal() {
    selectedMember = null;
    document.getElementById("memberModal").style.display = "none";
}

function removeSelectedMember() {
    if (!selectedMember) return;

    sendToPawn("remove_member", {
        name: selectedMember
    });

    closeMemberModal();
}

function leaveOrDeleteGroup() {
    if (isLeader()) {
        sendToPawn("delete_group");
    } else {
        sendToPawn("leave_group");
    }
}

function closePanel() {
    sendToPawn("close_panel");
}

function escapeHTML(text) {
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function escapeAttr(text) {
    return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, "&quot;");
}

window.loadGroupData = loadGroupData;

loadGroupDataFromURL();
